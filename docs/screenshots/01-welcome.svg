    <text x="148" y="36" fill="#3a5070" font-size="8" font-family="monospace" text-anchor="middle">PREPARE</text>
    <line x1="161" y1="14" x2="236" y2="14" stroke="#1a3050" stroke-width="1.5" stroke-dasharray="4,3"/>
