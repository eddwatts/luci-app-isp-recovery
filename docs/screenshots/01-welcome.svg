  <rect x="26" y="91" width="42" height="42" rx="4" fill="rgba(0,212,255,0.08)" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="47" y="118" font-size="22" text-anchor="middle">🔍</text>
