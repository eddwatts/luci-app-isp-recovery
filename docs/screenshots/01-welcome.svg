  <text x="110" y="59" fill="#3a5070" font-size="12" font-family="sans-serif">Status</text>
  <text x="162" y="59" fill="#3a5070" font-size="12" font-family="sans-serif">System</text>
  <text x="214" y="59" fill="#00d4ff" font-size="12" font-family="sans-serif">Network ▾</text>
  <text x="278" y="59" fill="#3a5070" font-size="12" font-family="sans-serif">Services</text>

