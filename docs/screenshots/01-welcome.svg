  <text x="44" y="387" fill="#ff6b35" font-size="12" font-family="sans-serif">⚠  LAN 1 will be temporarily taken offline during capture. LAN 2, LAN 3 and WiFi stay fully online.</text>

  <!-- Button -->
  <rect x="28" y="412" width="246" height="36" rx="3" fill="#00d4ff"/>
  <text x="151" y="435" fill="#0a0e14" font-size="12" font-family="sans-serif" font-weight="bold" text-anchor="middle" letter-spacing="1">⚡  CHECK INTERFACES &amp; CONTINUE</text>
