<svg xmlns="http://www.w3.org/2000/svg" width="860" height="520" viewBox="0 0 860 520">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0a0e14"/><stop offset="100%" stop-color="#0c1118"/></linearGradient>
  </defs>
  <!-- Window chrome -->
  <rect width="860" height="520" rx="10" fill="#1a1a2e"/>
  <rect width="860" height="34" rx="10" fill="#151525"/>
  <rect y="24" width="860" height="10" fill="#151525"/>
  <circle cx="18" cy="17" r="5" fill="#ff5f57"/><circle cx="34" cy="17" r="5" fill="#febc2e"/><circle cx="50" cy="17" r="5" fill="#28c840"/>
  <rect x="110" y="7" width="520" height="20" rx="10" fill="#0d0d1a"/>
  <text x="370" y="21" fill="#444466" font-size="11" font-family="monospace" text-anchor="middle">192.168.1.1 — LuCI › Network › ISP Recovery</text>

