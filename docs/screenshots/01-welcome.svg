    <line x1="569" y1="14" x2="644" y2="14" stroke="#1a3050" stroke-width="1.5" stroke-dasharray="4,3"/>
    <circle cx="658" cy="14" r="13" fill="#0a0e14" stroke="#1a3050" stroke-width="1.5"/>
