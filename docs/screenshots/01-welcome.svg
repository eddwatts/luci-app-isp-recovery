    <line x1="365" y1="14" x2="440" y2="14" stroke="#1a3050" stroke-width="1.5" stroke-dasharray="4,3"/>
    <circle cx="454" cy="14" r="13" fill="#0a0e14" stroke="#1a3050" stroke-width="1.5"/>
    <text x="454" y="19" fill="#3a5070" font-size="12" font-weight="bold" font-family="monospace" text-anchor="middle">5</text>
    <text x="454" y="36" fill="#3a5070" font-size="8" font-family="monospace" text-anchor="middle">AUTO-TEST</text>
    <line x1="467" y1="14" x2="542" y2="14" stroke="#1a3050" stroke-width="1.5" stroke-dasharray="4,3"/>
    <circle cx="556" cy="14" r="13" fill="#0a0e14" stroke="#1a3050" stroke-width="1.5"/>
    <text x="556" y="19" fill="#3a5070" font-size="12" font-weight="bold" font-family="monospace" text-anchor="middle">6</text>
