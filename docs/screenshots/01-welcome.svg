    <line x1="59" y1="14" x2="134" y2="14" stroke="#1a3050" stroke-width="1.5" stroke-dasharray="4,3"/>
    <circle cx="148" cy="14" r="13" fill="#0a0e14" stroke="#1a3050" stroke-width="1.5"/>
