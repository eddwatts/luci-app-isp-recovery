  <rect x="28" y="250" width="3" height="108" fill="#00d4ff"/>
  <text x="44" y="270" fill="#c0d0e0" font-size="12" font-family="sans-serif">This tool recovers your ISP connection credentials by briefly connecting your ISP router to LAN 1.</text>
  <text x="44" y="292" fill="#c0d0e0" font-size="12" font-family="sans-serif" font-weight="bold">Port assignment — important:</text>
  <text x="44" y="316" font-size="14">🔴</text>
  <text x="66" y="318" fill="#c0d0e0" font-size="12" font-family="sans-serif"><tspan fill="#00ff9d" font-weight="bold">LAN 1</tspan> — reserved for ISP router capture cable only.</text>
  <text x="44" y="340" font-size="14">💻</text>
  <text x="66" y="342" fill="#c0d0e0" font-size="12" font-family="sans-serif"><tspan fill="#00d4ff" font-weight="bold">LAN 2 / LAN 3</tspan> — use for your monitoring laptop.</text>

  <!-- Warning box -->
  <rect x="28" y="366" width="804" height="34" fill="rgba(255,107,53,0.07)" rx="3"/>
