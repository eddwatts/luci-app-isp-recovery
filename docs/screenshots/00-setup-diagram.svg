<svg xmlns="http://www.w3.org/2000/svg" width="900" height="460" viewBox="0 0 900 460">
  <defs>
    <linearGradient id="bgSetup" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e14"/>
      <stop offset="100%" stop-color="#0c1118"/>
    </linearGradient>
    <marker id="arrowGrey" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3a5070"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ff6b35"/>
    </marker>
    <marker id="arrowCyan" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00d4ff"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00ff9d"/>
    </marker>
  </defs>

  <rect width="900" height="460" rx="8" fill="url(#bgSetup)"/>

  <!-- Title -->
  <text x="450" y="34" fill="#00d4ff" font-size="15" font-family="sans-serif" font-weight="bold" text-anchor="middle" letter-spacing="3">EQUIPMENT SETUP</text>
  <line x1="30" y1="46" x2="870" y2="46" stroke="#1a3050" stroke-width="1"/>

  <!-- ── 1. ONT / WALL SOCKET (far left) ── -->
  <rect x="18" y="74" width="118" height="80" rx="5" fill="#0a1020" stroke="#3a5070" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="77" y="100" fill="#3a5070" font-size="22" text-anchor="middle">🔆</text>
  <text x="77" y="118" fill="#3a5070" font-size="10" font-family="sans-serif" font-weight="bold" text-anchor="middle">ONT / WALL</text>
  <text x="77" y="131" fill="#3a5070" font-size="9" font-family="sans-serif" text-anchor="middle">DSL · Fibre</text>
  <text x="77" y="143" fill="#3a5070" font-size="9" font-family="sans-serif" text-anchor="middle">Coax · FTTP</text>
  <!-- Label below -->
  <text x="77" y="170" fill="#3a5070" font-size="9" font-family="sans-serif" text-anchor="middle" font-weight="bold">External line</text>

  <!-- ONT → OpenWrt WAN -->
  <line x1="136" y1="114" x2="198" y2="114" stroke="#3a5070" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowGrey)"/>
  <text x="167" y="108" fill="#3a5070" font-size="8" font-family="sans-serif" text-anchor="middle">to WAN</text>

  <!-- ── 2. NEW OPENWRT ROUTER (centre-left) ── -->
  <rect x="198" y="60" width="228" height="132" rx="6" fill="#0e1a28" stroke="#00d4ff" stroke-width="2"/>
  <rect x="198" y="60" width="228" height="22" rx="6" fill="rgba(0,212,255,0.12)"/>
  <rect x="198" y="74" width="228" height="8" fill="rgba(0,212,255,0.12)"/>
  <text x="312" y="75" fill="#00d4ff" font-size="11" font-family="sans-serif" font-weight="bold" text-anchor="middle" letter-spacing="1">New OpenWrt Router</text>
  <text x="312" y="87" fill="#00d4ff" font-size="8" font-family="sans-serif" text-anchor="middle">(your replacement router)</text>

  <!-- Ports row -->
  <!-- WAN port -->
  <text x="228" y="108" fill="#00ff9d" font-size="8" font-family="monospace" text-anchor="middle">WAN</text>
  <rect x="212" y="111" width="32" height="13" rx="2" fill="#0a1a10" stroke="#00ff9d" stroke-width="1.5"/>
  <circle cx="228" cy="118" r="3.5" fill="#00ff9d"/>
  <!-- LAN 1 port -->
  <text x="282" y="108" fill="#ff3355" font-size="8" font-family="monospace" text-anchor="middle">LAN 1</text>
  <rect x="266" y="111" width="32" height="13" rx="2" fill="#1a0a0a" stroke="#ff3355" stroke-width="1.5"/>
  <circle cx="282" cy="118" r="3.5" fill="#ff3355"/>
  <!-- LAN 2 port -->
  <text x="336" y="108" fill="#00d4ff" font-size="8" font-family="monospace" text-anchor="middle">LAN 2</text>
  <rect x="320" y="111" width="32" height="13" rx="2" fill="#0a1a1a" stroke="#00d4ff" stroke-width="1.5"/>
  <circle cx="336" cy="118" r="3.5" fill="#00d4ff"/>
  <!-- LAN 3 port -->
  <text x="390" y="108" fill="#3a5070" font-size="8" font-family="monospace" text-anchor="middle">LAN 3</text>
  <rect x="374" y="111" width="32" height="13" rx="2" fill="#1a2a3a" stroke="#1a3050" stroke-width="1"/>
  <circle cx="390" cy="118" r="3" fill="#3a5070"/>

  <!-- LEDs -->
  <circle cx="212" cy="144" r="3.5" fill="#00ff9d" opacity="0.9"/>
  <circle cx="226" cy="144" r="3.5" fill="#00ff9d" opacity="0.9"/>
  <circle cx="240" cy="144" r="3.5" fill="#ff6b35" opacity="0.8"/>
  <circle cx="254" cy="144" r="3.5" fill="#ff3355" opacity="0.9"/>
  <circle cx="268" cy="144" r="3.5" fill="#00d4ff" opacity="0.9"/>
  <text x="312" y="160" fill="#3a5070" font-size="7.5" font-family="monospace" text-anchor="middle">Pwr  WAN  WiFi  LAN1  LAN2</text>

  <!-- LAN 1 annotation -->
  <rect x="256" y="166" width="52" height="22" rx="3" fill="rgba(255,51,85,0.08)" stroke="#ff3355" stroke-width="1"/>
  <text x="282" y="178" fill="#ff3355" font-size="8" font-family="sans-serif" text-anchor="middle" font-weight="bold">Capture port</text>
  <text x="282" y="187" fill="#ff3355" font-size="8" font-family="sans-serif" text-anchor="middle">old router only</text>

  <!-- LAN 2 annotation -->
  <rect x="310" y="166" width="52" height="22" rx="3" fill="rgba(0,212,255,0.06)" stroke="#00d4ff" stroke-width="1"/>
  <text x="336" y="178" fill="#00d4ff" font-size="8" font-family="sans-serif" text-anchor="middle">Laptop /</text>
  <text x="336" y="187" fill="#00d4ff" font-size="8" font-family="sans-serif" text-anchor="middle">monitor</text>

  <!-- ── LAN 1 → Old ISP Router WAN port (dashed orange — capture cable) ── -->
  <line x1="282" y1="124" x2="282" y2="238" stroke="#ff3355" stroke-width="3" stroke-dasharray="8,4" marker-end="url(#arrowOrange)"/>
  <!-- Cable label alongside the vertical line -->
  <rect x="218" y="246" width="130" height="14" rx="3" fill="#1a0a0a" stroke="#ff3355" stroke-width="1"/>
  <text x="283" y="256" fill="#ff3355" font-size="8" font-family="sans-serif" text-anchor="middle" font-weight="bold">Capture cable (Ethernet)</text>

  <!-- ── 3. OLD ISP ROUTER (bottom centre) ── -->
  <rect x="198" y="262" width="228" height="100" rx="6" fill="#0e1a10" stroke="#ff6b35" stroke-width="2"/>
  <rect x="198" y="262" width="228" height="22" rx="6" fill="rgba(255,107,53,0.12)"/>
  <rect x="198" y="276" width="228" height="8" fill="rgba(255,107,53,0.12)"/>
  <text x="312" y="277" fill="#ff6b35" font-size="11" font-family="sans-serif" font-weight="bold" text-anchor="middle" letter-spacing="1">Old ISP Router</text>
  <text x="312" y="289" fill="#ff6b35" font-size="8" font-family="sans-serif" text-anchor="middle">(being sniffed)</text>

  <!-- Old router ports -->
  <text x="240" y="308" fill="#ff6b35" font-size="8" font-family="monospace" text-anchor="middle">WAN/ETH</text>
  <rect x="224" y="311" width="32" height="13" rx="2" fill="#1a0e08" stroke="#ff6b35" stroke-width="1.5"/>
  <circle cx="240" cy="318" r="3.5" fill="#ff6b35"/>

  <text x="312" y="308" fill="#3a5070" font-size="8" font-family="monospace" text-anchor="middle">LAN ports</text>
  <rect x="280" y="311" width="64" height="13" rx="2" fill="#0a1418" stroke="#1a3050" stroke-width="1"/>
  <circle cx="296" cy="318" r="3" fill="#1a3050"/>
  <circle cx="312" cy="318" r="3" fill="#1a3050"/>
  <circle cx="328" cy="318" r="3" fill="#1a3050"/>

  <!-- Old router LEDs -->
  <circle cx="224" cy="344" r="3.5" fill="#ff6b35" opacity="0.9"/>
  <circle cx="238" cy="344" r="3.5" fill="#ff6b35" opacity="0.7"/>
  <circle cx="252" cy="344" r="3.5" fill="#3a5070" opacity="0.4"/>
  <text x="270" y="360" fill="#3a5070" font-size="7.5" font-family="monospace" text-anchor="middle">Pwr  DSL  LAN</text>

  <!-- Note: no external line needed on old router -->
  <rect x="350" y="300" width="66" height="50" rx="3" fill="rgba(0,0,0,0.3)" stroke="#1a3050" stroke-width="1"/>
  <text x="383" y="316" fill="#3a5070" font-size="8" font-family="sans-serif" text-anchor="middle">No DSL/fibre</text>
  <text x="383" y="328" fill="#3a5070" font-size="8" font-family="sans-serif" text-anchor="middle">needed on</text>
  <text x="383" y="340" fill="#3a5070" font-size="8" font-family="sans-serif" text-anchor="middle">old router —</text>
  <text x="383" y="352" fill="#00ff9d" font-size="8" font-family="sans-serif" text-anchor="middle" font-weight="bold">power only</text>

  <!-- ── LAN 2 → Laptop ── -->
  <line x1="426" y1="118" x2="540" y2="118" stroke="#00d4ff" stroke-width="2.5" marker-end="url(#arrowCyan)"/>
  <rect x="452" y="104" width="58" height="13" rx="3" fill="#0a1520" stroke="#00d4ff" stroke-width="1"/>
  <text x="481" y="114" fill="#00d4ff" font-size="8" font-family="sans-serif" text-anchor="middle">Eth cable</text>

  <!-- ── 4. LAPTOP (right) ── -->
  <rect x="540" y="62" width="200" height="128" rx="6" fill="#0e1520" stroke="#00d4ff" stroke-width="1.5"/>
  <rect x="556" y="72" width="168" height="74" rx="3" fill="#050a0f" stroke="#1a3050" stroke-width="1"/>
  <rect x="562" y="77" width="156" height="12" rx="2" fill="#0c1520"/>
  <text x="640" y="87" fill="#00d4ff" font-size="7" font-family="monospace" text-anchor="middle">LuCI › Network › ISP Recovery</text>
  <rect x="562" y="93" width="156" height="46" rx="2" fill="#0a0e14"/>
  <rect x="568" y="98" width="72" height="5" rx="1" fill="rgba(0,255,157,0.5)"/>
  <rect x="568" y="107" width="110" height="4" rx="1" fill="rgba(0,212,255,0.3)"/>
  <rect x="568" y="116" width="88" height="4" rx="1" fill="rgba(0,212,255,0.2)"/>
  <rect x="568" y="125" width="50" height="7" rx="2" fill="rgba(0,212,255,0.4)"/>
  <text x="590" y="131" fill="#0a0e14" font-size="7" font-family="sans-serif">▶ Start Capture</text>
  <rect x="556" y="154" width="168" height="8" rx="2" fill="#1a2535"/>
  <text x="640" y="175" fill="#3a5070" font-size="9" font-family="sans-serif" text-anchor="middle">Your monitoring laptop</text>
  <text x="640" y="188" fill="#2a3a50" font-size="8" font-family="sans-serif" text-anchor="middle">LAN 2 (or WiFi)</text>

  <!-- ── FLOW LABELS ── -->
  <!-- Step A label: ONT to router -->
  <rect x="18" y="200" width="118" height="36" rx="3" fill="rgba(58,80,112,0.12)" stroke="#3a5070" stroke-width="1"/>
  <text x="77" y="215" fill="#3a5070" font-size="9" font-family="sans-serif" text-anchor="middle" font-weight="bold">① Normal WAN</text>
  <text x="77" y="228" fill="#3a5070" font-size="9" font-family="sans-serif" text-anchor="middle">internet connection</text>

  <!-- Step B: OpenWrt in the middle -->
  <rect x="198" y="200" width="228" height="36" rx="3" fill="rgba(0,212,255,0.04)" stroke="#00d4ff" stroke-width="1"/>
  <text x="312" y="215" fill="#00d4ff" font-size="9" font-family="sans-serif" text-anchor="middle" font-weight="bold">② Sits between WAN and old router</text>
  <text x="312" y="228" fill="#3a5070" font-size="9" font-family="sans-serif" text-anchor="middle">Intercepts auth traffic on LAN 1</text>

  <!-- ── CHECKLIST ── -->
  <rect x="540" y="212" width="340" height="222" rx="4" fill="rgba(0,0,0,0.25)" stroke="#1a3050" stroke-width="1"/>
  <text x="710" y="232" fill="#3a5070" font-size="10" font-family="sans-serif" font-weight="bold" text-anchor="middle" letter-spacing="1">BEFORE YOU CLICK START</text>
  <line x1="554" y1="238" x2="866" y2="238" stroke="#1a3050" stroke-width="1"/>

  <text x="558" y="258" fill="#ff6b35" font-size="13">◻</text>
  <text x="576" y="258" fill="#c0d0e0" font-size="10" font-family="sans-serif">ONT/external line → OpenWrt <tspan fill="#00ff9d" font-weight="bold">WAN</tspan></text>
  <text x="558" y="276" fill="#ff6b35" font-size="13">◻</text>
  <text x="576" y="276" fill="#c0d0e0" font-size="10" font-family="sans-serif">Ethernet: old router WAN → OpenWrt <tspan fill="#ff3355" font-weight="bold">LAN 1</tspan></text>
  <text x="558" y="294" fill="#ff6b35" font-size="13">◻</text>
  <text x="576" y="294" fill="#c0d0e0" font-size="10" font-family="sans-serif">Old router powered on (no DSL needed)</text>
  <text x="558" y="312" fill="#ff6b35" font-size="13">◻</text>
  <text x="576" y="312" fill="#c0d0e0" font-size="10" font-family="sans-serif">Old router rebooted for fresh auth</text>
  <text x="558" y="330" fill="#00d4ff" font-size="13">◻</text>
  <text x="576" y="330" fill="#c0d0e0" font-size="10" font-family="sans-serif">Laptop on <tspan fill="#00d4ff" font-weight="bold">LAN 2</tspan>, LAN 3 or WiFi — not LAN 1</text>
  <text x="558" y="348" fill="#00d4ff" font-size="13">◻</text>
  <text x="576" y="348" fill="#c0d0e0" font-size="10" font-family="sans-serif">Wizard open in browser showing Step 3</text>

  <!-- Bottom warning -->
  <rect x="554" y="360" width="306" height="30" rx="3" fill="rgba(255,51,85,0.07)" stroke="rgba(255,51,85,0.3)" stroke-width="1"/>
  <text x="707" y="371" fill="#ff6b35" font-size="9" font-family="sans-serif" text-anchor="middle" font-weight="bold">⚠ Old router has no DSL/fibre line needed</text>
  <text x="707" y="383" fill="#ff6b35" font-size="9" font-family="sans-serif" text-anchor="middle">It authenticates via LAN 1 — power only required</text>

  <!-- ── LEGEND ── -->
  <rect x="18" y="400" width="510" height="44" rx="4" fill="rgba(0,0,0,0.25)" stroke="#1a3050" stroke-width="1"/>
  <line x1="36" y1="418" x2="64" y2="418" stroke="#3a5070" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="72" y="422" fill="#3a5070" font-size="10" font-family="sans-serif">ONT / external line to WAN</text>
  <line x1="220" y1="418" x2="248" y2="418" stroke="#ff3355" stroke-width="3" stroke-dasharray="8,4"/>
  <text x="256" y="422" fill="#ff3355" font-size="10" font-family="sans-serif">Capture cable — LAN 1 only</text>
  <line x1="390" y1="418" x2="418" y2="418" stroke="#00d4ff" stroke-width="2.5"/>
  <text x="426" y="422" fill="#00d4ff" font-size="10" font-family="sans-serif">Monitoring — LAN 2/3 or WiFi</text>

  <text x="272" y="440" fill="#3a5070" font-size="9" font-family="sans-serif" text-anchor="middle">The OpenWrt router sits between the internet and the old ISP router, intercepting its authentication</text>
</svg>
