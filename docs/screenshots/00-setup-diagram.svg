<svg xmlns="http://www.w3.org/2000/svg" width="860" height="420" viewBox="0 0 860 420">
  <defs>
    <linearGradient id="bgSetup" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0a0e14"/><stop offset="100%" stop-color="#0c1118"/></linearGradient>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00d4ff"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00ff9d"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ff6b35"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="420" rx="8" fill="url(#bgSetup)"/>
  <rect width="860" height="1" y="419" fill="#1a3050"/>

  <!-- Title -->
  <text x="430" y="36" fill="#00d4ff" font-size="16" font-family="sans-serif" font-weight="bold" text-anchor="middle" letter-spacing="3">EQUIPMENT SETUP</text>
  <text x="430" y="56" fill="#3a5070" font-size="11" font-family="monospace" text-anchor="middle">Connect your laptop on LAN 2 or LAN 3 — never LAN 1</text>
  <line x1="60" y1="68" x2="800" y2="68" stroke="#1a3050" stroke-width="1"/>

  <!-- ── INTERNET CLOUD ── -->
  <ellipse cx="430" cy="118" rx="52" ry="32" fill="rgba(0,212,255,0.05)" stroke="#1a3050" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="430" y="112" fill="#3a5070" font-size="11" font-family="sans-serif" text-anchor="middle">🌐</text>
  <text x="430" y="128" fill="#3a5070" font-size="10" font-family="sans-serif" text-anchor="middle">INTERNET</text>
  <!-- Down arrow from internet to router -->
  <line x1="430" y1="150" x2="430" y2="172" stroke="#1a3050" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowBlue)"/>

  <!-- ── OPENWRT ROUTER (centre) ── -->
  <rect x="330" y="175" width="200" height="88" rx="6" fill="#0e1a28" stroke="#00d4ff" stroke-width="2"/>
  <rect x="330" y="175" width="200" height="22" rx="6" fill="rgba(0,212,255,0.12)"/>
  <rect x="330" y="189" width="200" height="8" fill="rgba(0,212,255,0.12)"/>
  <text x="430" y="191" fill="#00d4ff" font-size="11" font-family="sans-serif" font-weight="bold" text-anchor="middle" letter-spacing="1">OpenWrt Router</text>

  <!-- Port labels -->
  <text x="360" y="216" fill="#3a5070" font-size="9" font-family="monospace" text-anchor="middle">WAN</text>
  <rect x="344" y="220" width="32" height="14" rx="2" fill="#1a2a3a" stroke="#1a3050" stroke-width="1"/>
  <circle cx="360" cy="227" r="4" fill="#3a5070"/>

  <text x="408" y="216" fill="#ff3355" font-size="9" font-family="monospace" text-anchor="middle">LAN 1</text>
  <rect x="392" y="220" width="32" height="14" rx="2" fill="#1a0a0a" stroke="#ff3355" stroke-width="1.5"/>
  <circle cx="408" cy="227" r="4" fill="#ff3355"/>

  <text x="452" y="216" fill="#00d4ff" font-size="9" font-family="monospace" text-anchor="middle">LAN 2</text>
  <rect x="436" y="220" width="32" height="14" rx="2" fill="#0a1a1a" stroke="#00d4ff" stroke-width="1"/>
  <circle cx="452" cy="227" r="4" fill="#00d4ff"/>

  <text x="496" y="216" fill="#3a5070" font-size="9" font-family="monospace" text-anchor="middle">LAN 3</text>
  <rect x="480" y="220" width="32" height="14" rx="2" fill="#1a2a3a" stroke="#1a3050" stroke-width="1"/>
  <circle cx="496" cy="227" r="4" fill="#3a5070"/>

  <!-- Status LEDs -->
  <circle cx="350" cy="248" r="4" fill="#00ff9d" opacity="0.8"/>
  <circle cx="365" cy="248" r="4" fill="#00ff9d" opacity="0.8"/>
  <circle cx="380" cy="248" r="4" fill="#ff6b35" opacity="0.9"/>
  <circle cx="395" cy="248" r="4" fill="#ff3355" opacity="0.7"/>
  <text x="430" y="254" fill="#3a5070" font-size="8" font-family="monospace" text-anchor="middle">Power  WAN  WiFi  LAN</text>

  <!-- ── ISP ROUTER (left) ── -->
  <rect x="60" y="295" width="160" height="72" rx="6" fill="#0e1a10" stroke="#ff6b35" stroke-width="2"/>
  <rect x="60" y="295" width="160" height="20" rx="6" fill="rgba(255,107,53,0.1)"/>
  <rect x="60" y="307" width="160" height="8" fill="rgba(255,107,53,0.1)"/>
  <text x="140" y="309" fill="#ff6b35" font-size="11" font-family="sans-serif" font-weight="bold" text-anchor="middle" letter-spacing="1">ISP Router / Modem</text>
  <text x="140" y="328" fill="#3a5070" font-size="9" font-family="sans-serif" text-anchor="middle">(your old router)</text>
  <!-- WAN port label on ISP router -->
  <text x="100" y="346" fill="#ff6b35" font-size="9" font-family="monospace" text-anchor="middle">WAN port</text>
  <rect x="84" y="349" width="32" height="12" rx="2" fill="#1a0e08" stroke="#ff6b35" stroke-width="1"/>
  <circle cx="100" cy="355" r="3.5" fill="#ff6b35"/>
  <!-- Status lights -->
  <circle cx="130" cy="354" r="3" fill="#ff6b35" opacity="0.9"/>
  <circle cx="144" cy="354" r="3" fill="#ff6b35" opacity="0.7"/>
  <circle cx="158" cy="354" r="3" fill="#3a5070" opacity="0.5"/>
  <text x="140" y="370" fill="#3a5070" font-size="8" font-family="monospace" text-anchor="middle">Pwr  DSL  LAN</text>

  <!-- ── LAPTOP (right) ── -->
  <rect x="636" y="285" width="164" height="90" rx="6" fill="#0e1520" stroke="#00d4ff" stroke-width="1.5"/>
  <!-- Screen -->
  <rect x="650" y="294" width="136" height="62" rx="3" fill="#050a0f" stroke="#1a3050" stroke-width="1"/>
  <!-- LuCI UI hint in screen -->
  <rect x="656" y="299" width="124" height="10" rx="2" fill="#0c1520"/>
  <text x="718" y="308" fill="#00d4ff" font-size="7" font-family="monospace" text-anchor="middle">LuCI › ISP Recovery</text>
  <rect x="656" y="313" width="124" height="36" rx="2" fill="#0a0e14"/>
  <rect x="660" y="317" width="50" height="6" rx="1" fill="rgba(0,255,157,0.4)"/>
  <rect x="660" y="327" width="80" height="5" rx="1" fill="rgba(0,212,255,0.3)"/>
  <rect x="660" y="336" width="65" height="5" rx="1" fill="rgba(0,212,255,0.2)"/>
  <text x="718" y="365" fill="#3a5070" font-size="8" font-family="sans-serif" text-anchor="middle">Monitoring laptop</text>
  <!-- Keyboard hint -->
  <rect x="660" y="368" width="116" height="6" rx="2" fill="#1a2535"/>

  <!-- ── CABLES ── -->

  <!-- ISP router WAN port → LAN 1 on OpenWrt (RED — capture cable) -->
  <!-- Path: from ISP router WAN port (100,349) up and right to LAN1 (408,234) -->
  <path d="M 140,295 C 140,265 408,265 408,234" stroke="#ff6b35" stroke-width="3" fill="none" stroke-dasharray="8,4"/>
  <!-- Label on cable -->
  <rect x="230" y="256" width="140" height="20" rx="3" fill="#1a0a0a" stroke="#ff6b35" stroke-width="1"/>
  <text x="300" y="270" fill="#ff6b35" font-size="10" font-family="sans-serif" font-weight="bold" text-anchor="middle">Capture cable</text>

  <!-- Laptop LAN port → LAN 2 on OpenWrt (BLUE — monitoring) -->
  <path d="M 636,330 C 560,330 560,234 468,234" stroke="#00d4ff" stroke-width="2.5" fill="none"/>
  <!-- Label -->
  <rect x="520" y="288" width="120" height="20" rx="3" fill="#0a1520" stroke="#00d4ff" stroke-width="1"/>
  <text x="580" y="302" fill="#00d4ff" font-size="10" font-family="sans-serif" text-anchor="middle">Monitoring cable</text>

  <!-- ── LEGEND ── -->
  <rect x="60" y="390" width="740" height="24" rx="3" fill="rgba(0,0,0,0.3)"/>
  <line x1="80" y1="402" x2="110" y2="402" stroke="#ff6b35" stroke-width="3" stroke-dasharray="8,4"/>
  <text x="118" y="406" fill="#ff6b35" font-size="11" font-family="sans-serif">Capture cable (LAN 1 only)</text>
  <line x1="310" y1="402" x2="340" y2="402" stroke="#00d4ff" stroke-width="2.5"/>
  <text x="348" y="406" fill="#00d4ff" font-size="11" font-family="sans-serif">Monitoring connection (LAN 2/3 or WiFi)</text>
  <line x1="590" y1="402" x2="620" y2="402" stroke="#1a3050" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="628" y="406" fill="#3a5070" font-size="11" font-family="sans-serif">WAN / Internet</text>
</svg>
